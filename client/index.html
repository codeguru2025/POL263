<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>POL263</title>

    <meta property="og:title" content="POL263" />
    <meta property="og:description" content="Core Administration Platform - Staff & Client Portals" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="POL263" />
    <meta name="twitter:description" content="Core Administration Platform - Staff & Client Portals" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d9488" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/assets/logo.png" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: hsl(0 0% 6%);
        color: hsl(43 30% 95%);
        font-family: 'Plus Jakarta Sans', sans-serif;
        transition: opacity 0.4s ease-out;
      }
      #app-splash.splash-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .splash-logo {
        width: auto;
        max-width: min(320px, 88vw);
        height: auto;
        max-height: 56px;
        object-fit: contain;
        object-position: left center;
        animation: splash-pulse 1.2s ease-in-out infinite;
      }
      #app-splash .splash-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid hsl(0 0% 14%);
        border-top-color: #14b8a6;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.85; transform: scale(1.02); }
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <img src="/assets/logo.png" alt="POL263" class="splash-logo" />
      <div class="splash-spinner" aria-label="Loading"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
