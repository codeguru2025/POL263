# Build and deploy web + Android + iOS on every push to main.
# Also runs on PRs to main to verify lockfile + build (no merge if lockfile out of sync).
# Uses a Linux-generated lockfile for the build so lint:lock passes (lockfile from Windows differs on Linux).
name: Build Web & Mobile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  lockfile-linux:
    name: Generate lockfile (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Pin npm
        run: npm install -g npm@11.11.0
      - name: Generate lockfile on Linux
        run: npm install --package-lock-only --include=dev --ignore-scripts
      - name: Upload lockfile
        uses: actions/upload-artifact@v4
        with:
          name: package-lock-linux
          path: package-lock.json

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: lockfile-linux
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Use Linux lockfile
        uses: actions/download-artifact@v4
        with:
          name: package-lock-linux
          path: .

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile in sync
        run: npm run lint:lock

      - name: Build web client
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || '' }}

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            dist/public
            dist/index.cjs

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build Android APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-android-release:
    name: Build Android Release (AAB)
    runs-on: ubuntu-latest
    needs: build-web
    # Run only when repo variable ANDROID_RELEASE_ENABLED is 'true' (set after configuring keystore secrets).
    # Job-level if cannot use secrets; use vars instead.
    if: vars.ANDROID_RELEASE_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Decode keystore and build release AAB
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          export RELEASE_STORE_FILE="$(pwd)/android/app/release.keystore"
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build

      - name: Sync Capacitor (iOS)
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS (Simulator)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -configuration Debug build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
