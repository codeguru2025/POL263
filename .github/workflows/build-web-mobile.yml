# Build and deploy web + Android + iOS on every push to main.
# Web: build output is published (Netlify/Vercel can deploy from git or use their API).
# Android: APK artifact uploaded (debug build; configure signing for release).
# iOS: build runs on macOS (simulator build in CI; configure signing for device/TestFlight).

name: Build Web & Mobile

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web client
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || '' }}

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            dist/public
            dist/index.cjs

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build Android APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build

      - name: Sync Capacitor (iOS)
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS (Simulator)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -configuration Debug build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
