# Build web on every push to main.
# Also runs on PRs to main to verify lockfile + build (no merge if lockfile out of sync).
# Uses a Linux-generated lockfile for the build so lint:lock passes (lockfile from Windows differs on Linux).
# Mobile (Capacitor Android/iOS) build jobs were removed when the native Capacitor app was
# deleted — a mobile app is being rebuilt separately with Expo.
name: Build Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  lockfile-linux:
    name: Generate lockfile (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Pin npm
        run: npm install -g npm@11.11.0
      - name: Generate lockfile on Linux
        run: npm install --package-lock-only --ignore-scripts
      - name: Upload lockfile
        uses: actions/upload-artifact@v4
        with:
          name: package-lock-linux
          path: package-lock.json

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: lockfile-linux
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Use Linux lockfile
        uses: actions/download-artifact@v4
        with:
          name: package-lock-linux
          path: .

      - name: Pin npm
        run: npm install -g npm@11.11.0

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile in sync
        run: npm run lint:lock

      - name: Build web client
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || '' }}

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            dist/public
            dist/index.cjs
