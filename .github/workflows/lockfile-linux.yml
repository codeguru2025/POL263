# Regenerate package-lock.json on Linux so DigitalOcean (ubuntu) npm ci succeeds.
# Platform-specific optional deps (e.g. @esbuild/linux-x64, @rollup/rollup-linux-x64-gnu,
# @tailwindcss/oxide-linux-x64-gnu, lightningcss-linux-x64-gnu) are only resolved when
# npm install runs on Linux. A lockfile authored on Windows omits them → npm ci fails.
#
# On push to main: regenerate, verify build, auto-commit if changed.
# On PRs: regenerate, verify build, fail if lockfile differs (contributor must merge main).
name: Lockfile (Linux)

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .npmrc
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .npmrc
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22"

jobs:
  lockfile:
    name: Regen & verify lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can push back; use the default GITHUB_TOKEN
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Pin npm to 11.11.0
        run: npm install -g npm@11.11.0

      - name: Clean slate
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Generate lockfile on Linux
        run: npm install --package-lock-only --include=dev

      - name: Verify npm ci
        run: npm ci --include=dev

      - name: Verify build
        run: npm run build

      - name: Check if lockfile changed
        id: diff
        run: |
          if git diff --quiet package-lock.json 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── On push to main: auto-commit the updated lockfile ──
      - name: Commit & push lockfile
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: regen package-lock on linux for deploy"
          git push

      # ── On PRs: fail so contributor knows to merge main after bot updates ──
      - name: Fail PR if lockfile out of sync
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::package-lock.json differs when generated on Linux."
          echo "Merge the latest main (which has the Linux-generated lockfile) into your branch and push again."
          exit 1
