# Regenerate package-lock.json on Linux so DigitalOcean (ubuntu) npm ci succeeds.
#
# Problem: npm resolves platform-specific optional deps (esbuild, rollup, tailwindcss-oxide,
# lightningcss) based on the OS where `npm install` runs. A lockfile from Windows omits
# linux-x64 binaries → `npm ci` on DO/Ubuntu fails with "Missing: …".
#
# Solution: CI regenerates the lockfile on ubuntu, verifies the build, then:
#   1. ALWAYS force-pushes HEAD (main + lockfile) to the `deploy` branch.
#      DigitalOcean tracks `deploy`, so this is what gets deployed.
#   2. Best-effort: also commits the lockfile back to `main` (may fail in a
#      race; non-fatal — deploy is already updated, main gets it next push).
#
# Loop protection: skips runs triggered by github-actions[bot] or [skip ci] commits.
name: Lockfile (Linux) & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .npmrc
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22"

jobs:
  lockfile:
    name: Regen lockfile & sync deploy
    runs-on: ubuntu-latest

    # Loop protection: don't run on our own commits
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Pin npm to 11.11.0
        run: npm install -g npm@11.11.0

      - name: Clean slate
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Generate lockfile on Linux
        run: npm install --package-lock-only --include=dev --ignore-scripts

      - name: Verify npm ci
        run: npm ci --include=dev

      - name: Verify build
        run: npm run build

      - name: Check if lockfile changed
        id: diff
        run: |
          if git diff --quiet package-lock.json 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── CRITICAL: always sync deploy branch ──────────────────────────────
      # This step runs regardless of what happens above.
      # We locally commit the (possibly updated) lockfile and force-push to deploy.
      # DigitalOcean tracks deploy — this is what actually gets deployed.
      - name: Sync deploy branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage lockfile (may or may not have changed)
          git add package-lock.json
          # Commit locally only if there are staged changes
          git diff --staged --quiet || git commit -m "chore: linux lockfile [skip ci]"
          echo "Pushing $(git rev-parse --short HEAD) → deploy"
          git push origin HEAD:refs/heads/deploy --force

      # ── Best-effort: also push lockfile to main ───────────────────────────
      # Uses rebase to handle the race condition where main moved since checkout.
      # Non-fatal: deploy is already updated above; main gets it on the next push.
      - name: Update main lockfile (best-effort)
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git pull --rebase origin main || (git rebase --abort && echo "Rebase conflict skipped — deploy already updated")
          git push origin HEAD:refs/heads/main || echo "Main lockfile push skipped (race condition) — deploy already updated"

      # ── On PRs: fail so contributor knows to merge main ──────────────────
      - name: Fail PR if lockfile out of sync
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::package-lock.json differs when generated on Linux."
          echo "Merge the latest main (which has the Linux-generated lockfile) into your branch and push again."
          exit 1
