# Regenerate package-lock.json on Linux so DigitalOcean (ubuntu) npm ci succeeds.
#
# Problem: npm resolves platform-specific optional deps (esbuild, rollup, tailwindcss-oxide,
# lightningcss) based on the OS where `npm install` runs. A lockfile from Windows omits
# linux-x64 binaries → `npm ci` on DO/Ubuntu fails with "Missing: …".
#
# Solution: CI regenerates the lockfile on ubuntu, verifies the build, commits to main,
# then fast-forwards the `deploy` branch. DigitalOcean tracks `deploy`, not `main`,
# so it only builds commits that already have a Linux-correct lockfile.
#
# Loop protection: skips runs triggered by github-actions[bot] or [skip ci] commits.
name: Lockfile (Linux) & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .npmrc
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22"

jobs:
  lockfile:
    name: Regen lockfile & sync deploy
    runs-on: ubuntu-latest

    # Loop protection: don't run on our own commits
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Pin npm to 11.11.0
        run: npm install -g npm@11.11.0

      - name: Clean slate
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Generate lockfile on Linux
        run: npm install --package-lock-only --include=dev --ignore-scripts

      - name: Verify npm ci
        run: npm ci --include=dev

      - name: Verify build
        run: npm run build

      - name: Check if lockfile changed
        id: diff
        run: |
          if git diff --quiet package-lock.json 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── On push to main: auto-commit the updated lockfile ──
      - name: Commit lockfile to main
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: regen package-lock on linux [skip ci]"
          git push origin main

      # ── Fast-forward deploy branch to current main HEAD ──
      - name: Sync deploy branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Pushing main HEAD ($(git rev-parse --short HEAD)) → deploy"
          git push origin HEAD:refs/heads/deploy --force

      # ── On PRs: fail so contributor knows to merge main ──
      - name: Fail PR if lockfile out of sync
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::package-lock.json differs when generated on Linux."
          echo "Merge the latest main (which has the Linux-generated lockfile) into your branch and push again."
          exit 1
