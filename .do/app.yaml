# POL263 – DigitalOcean App Platform spec (template)
# Set real secrets in the dashboard (Settings → App-Level Environment Variables).
# Do not commit real values for: SESSION_SECRET, DATABASE_URL, GOOGLE_CLIENT_SECRET, PAYNOW_INTEGRATION_KEY.
#
# ENV VAR STRATEGY:
# ─────────────────
# Platform-level vars (this file / DO dashboard):
#   DATABASE_URL       – central registry DB (organizations, users, roles)
#   SUPERUSER_EMAIL    – platform owner (ausiziba@gmail.com) — highest authority
#   SESSION_SECRET     – session encryption key
#   GOOGLE_CLIENT_*    – OAuth for staff login
#   PAYNOW_*           – payment gateway (shared across tenants)
#
# Tenant-level config is stored in the database (organizations table), NOT env vars:
#   database_url       – optional dedicated DB per tenant
#   logo_url, primary_color, address, phone, email, website – branding
#   is_whitelabeled    – full white-label vs POL263-branded
#   footer_text, signature_url – document branding
#
# This means adding a new tenant requires NO app restart or env var changes.
# The platform owner creates tenants via the UI, sets their DB URL and branding,
# and the system handles routing transparently.

name: pol263
region: lon
features:
  - buildpack-stack=ubuntu-22
services:
  - name: pol263
    run_command: npm start
    build_command: npm run build:do
    environment_slug: node-js
    http_port: 5000
    source_dir: /
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    github:
      repo: codeguru2025/POL263
      branch: deploy
    envs:
      - key: DB_ACCEPT_SELF_SIGNED
        value: "true"
        scope: RUN_AND_BUILD_TIME
      - key: HOST
        value: "0.0.0.0"
        scope: RUN_TIME
ingress:
  rules:
    - match:
        path:
          prefix: /
      component:
        name: pol263
envs:
  - key: NODE_ENV
    value: production
    scope: RUN_AND_BUILD_TIME
  - key: HOST
    value: 0.0.0.0
    scope: RUN_AND_BUILD_TIME
  - key: DATABASE_URL
    value: SET_IN_DASHBOARD
    scope: RUN_AND_BUILD_TIME
  - key: APP_BASE_URL
    value: https://pol263-hl5ef.ondigitalocean.app
    scope: RUN_AND_BUILD_TIME
  - key: API_BASE_URL
    value: https://pol263-hl5ef.ondigitalocean.app
    scope: RUN_AND_BUILD_TIME
  - key: VITE_APP_PUBLIC_URL
    value: https://pol263-hl5ef.ondigitalocean.app
    scope: RUN_AND_BUILD_TIME
  - key: PAYNOW_RETURN_URL
    value: https://pol263-hl5ef.ondigitalocean.app/client/payments/return
    scope: RUN_AND_BUILD_TIME
  - key: PAYNOW_RESULT_URL
    value: https://pol263-hl5ef.ondigitalocean.app/api/payments/paynow/result
    scope: RUN_AND_BUILD_TIME
  - key: GOOGLE_CALLBACK_URL
    value: https://pol263-hl5ef.ondigitalocean.app/api/auth/google/callback
    scope: RUN_AND_BUILD_TIME
  - key: PAYNOW_INTEGRATION_ID
    value: "22462"
    scope: RUN_AND_BUILD_TIME
  - key: PAYNOW_INTEGRATION_KEY
    value: SET_IN_DASHBOARD
    scope: RUN_AND_BUILD_TIME
  - key: PAYNOW_AUTH_EMAIL
    value: SET_IN_DASHBOARD
    scope: RUN_AND_BUILD_TIME
  - key: PAYNOW_MODE
    value: live
    scope: RUN_AND_BUILD_TIME
  - key: PAYMENTS_PAYNOW_ENABLED
    value: "true"
    scope: RUN_AND_BUILD_TIME
  - key: GOOGLE_CLIENT_ID
    value: SET_IN_DASHBOARD
    scope: RUN_AND_BUILD_TIME
  - key: GOOGLE_CLIENT_SECRET
    value: SET_IN_DASHBOARD
    scope: RUN_AND_BUILD_TIME
  - key: SESSION_SECRET
    value: SET_IN_DASHBOARD
    scope: RUN_AND_BUILD_TIME
  - key: SUPERUSER_EMAIL
    value: ausiziba@gmail.com
    scope: RUN_AND_BUILD_TIME
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
